# Data Prep Config
clickhouse:
  host: "localhost"
  port: 18123
  user: "pplus"
  password: "${CH_PASSWORD}"
  database: "logs"
  table: "fortigate_traffic"

sampling:
  total_rows: 300000
  splits:
    threat: 50000      # IPS, virus, WAF, anomaly, file-filter
    blocked: 50000     # app-ctrl / webfilter blocks
    denied: 50000      # firewall denials
    suspicious: 50000  # resets, timeouts
    normal: 100000     # accept/pass/close
  train_ratio: 0.85
  val_ratio: 0.10
  test_ratio: 0.05

output:
  dir: "./datasets"
  format: "jsonl"
